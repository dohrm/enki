# cargo-deny config. Checked on push (see lefthook.yml):
#   cargo deny check licenses advisories sources
# The dependency tree is fully permissive — this allow-list reflects it.

[advisories]
version = 2
ignore = [
    # `paste` is unmaintained (not a vulnerability). Pulled transitively by genai;
    # no safe upgrade exists yet. Revisit when genai drops it.
    "RUSTSEC-2024-0436",
    # `rustls-pemfile` unmaintained (not a vulnerability). Pulled via
    # qdrant-client → tonic; no safe upgrade yet. Revisit when tonic migrates to
    # rustls-pki-types' PemObject.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    # NCSA (permissive, OSI + FSF approved). Required by libfuzzer-sys, a fuzzing
    # dev-dependency of rav1e (fastembed → image → ravif → rav1e) — never built in
    # a normal build, but cargo-deny scans the whole graph.
    "NCSA",
]

# MPL-2.0 is file-level copyleft: using it as an unmodified dependency puts no
# obligation on our code. Allowed surgically for the crates that carry it, rather
# than opening MPL-2.0 crate-wide.
#   option-ext ← fastembed → hf-hub → dirs → dirs-sys   (feature `fastembed`)
[[licenses.exceptions]]
name = "option-ext"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
