name: Publish

# Tag-driven release to crates.io. Tag the commit `vX.Y.Z` and push:
#   git tag v0.1.0 && git push origin v0.1.0
# The tag is the single source of truth for the version — it is written into
# Cargo.toml at publish time, so `main` never carries a bumped-but-unreleased
# version.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Verify ────────────────────────────────────────────────────────────────
  # A release re-runs the full gate; a red tag never ships.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --all-features

  # ── Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          cargo set-version "$VERSION"

      # --allow-dirty: `set-version` just edited Cargo.toml / Cargo.lock.
      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
